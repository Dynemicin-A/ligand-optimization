seed: 2025

model:
  num_ligand_atom_types: 16
  num_protein_atom_types: 32
  num_bond_types: 5
  hidden_dim: 128
  time_dim: 64
  rbf_dim: 32
  num_blocks: 5
  ligand_knn: 20
  protein_knn: 28
  cross_knn: 40
  source_knn: 20
  cutoff: 12.0
  dropout: 0.1

diffusion:
  num_timesteps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  atom_mask_token: 15
  pos_loss_weight: 1.0
  atom_loss_weight: 1.0
  bond_loss_weight: 0.2
  hard_negative_loss_weight: 0.0
  hard_negative_margin: 0.2

data:
  kind: pt_manifest
  manifest: data/processed_h2l_v4_expanded/split/train_manifest.txt

train:
  batch_size: 8
  num_workers: 2
  pin_memory: true
  drop_last: true
  valid_fraction: 0.03
  max_steps: 240000
  lr: 0.00008
  weight_decay: 0.0002
  grad_clip: 1.0
  log_every: 50
  valid_every: 2000
  valid_batches: 48
  save_every: 2000
  ema:
    enabled: true
    decay: 0.999
    validate: true
  early_stopping:
    enabled: true
    monitor: valid_loss
    mode: min
    min_delta: 0.01
    patience: 8
    start_after: 30000
    save_best: true
